<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bram's Layout Practice</title>
  <style>
    /* Intentionally basic and not responsive.
       Students should improve this with Flexbox, Grid, and media queries. */

    header,
    nav,
    main,
    footer {
      max-width: 1000px;
      margin: 20px auto;
      padding: 20px;
      border: 2px solid black;
      background-color: rgb(139, 138, 138);
    }

    body {
      font-family: Times, sans-serif;
      margin: 1;
      line-height: 10px;
      background-color: rgb(139, 138, 138);
      color: rgb(0, 0, 0);
    }

    header {
      background-color: rgb(139, 138, 138);
      padding: 20px;
      border: 2px solid black;
      margin: 10px;
    }

    nav {
      background-color: rgb(255, 255, 255);
      padding: 20px;
      border: 2px solid black;
      margin: 10px;

      display: flex;
      gap: 20px;

      justify-content: center;
      align-items: center;
    }

    nav a {
      text-decoration: none;
      color: black;
      font-weight: bold;
      nav a:hover {
        color: gray;
      }
    }


    main {
      background-color: rgb(255, 255, 255);
      padding: 20px;
      border: 2px solid black;
      margin: 10px;
      min-height: 300px;
    }

    section {
      background-color: white;
      border: 2px dashed gray;
      padding: 20px;
      margin-bottom: 15px;
    }

    .box {
      background-color: #e5e5e5;
      border: 2px solid gray;
      padding: 20px;
      margin-bottom: 10px;

      

      background-color: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);

      text-align: center;
    }

    footer {
      background-color: lightgray;
      padding: 20px;
      border: 2px solid black;
      margin: 10px;
    }

    .hero {
      background-color: #e6f0ff;
      padding: 40px;
      border-radius: 10px;
      text-align: center;
    }  


    .hero h2 {
      font-size: 28px;
      margin-bottom: 10px;
      } 

    .hero p {
        font-size: 18px;
        color: #333;
      }
      
    .hero button {
        margin-top: 15px;
        padding: 10px 20px;
        border: none;
        background-color: black;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    .hero button:hover {
        background-color: gray;
      }

    .cards-section {
      align-items: stretch;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
    }

    .box {
      transition: 0.2s;
      
    }

    .box h3 {
      margin-bottom: 10px;
    }

    .box p {
      font-size: 14px;
      color: #555;
    }

    .box:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    }
  
  </style>
</head>
<body>

  <header>
    <h1>Bram's Improved Website</h1>
    <p>This website is really starting to get somewhere...</p>
  </header>

  <nav>

    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>


  </nav>
  
  <main>
    <section class="hero"> 
      <button>Learn More</button>
    </section>

      <h2>Cards and Boxes</h2>
      <p>This is the main content area.</p>
    </section>

    <section class="cards-section">
    <h2>Cards / Boxes</h2>
      <div class="box">
      <h3>Card 1</h3>
      <p>Some short description text.</p>
      </div>

    <div class="box">
      <h3>Card 2</h3>
      <p>Some short description text.</p>
      </div>

    <div class="box">
      <h3>Card 3</h3>
      <p>Some short description text.</p>
      </div>
    </section>
  </main>

  <footer>
    <p>Footer content</p>
  </footer>

</body>
</html>
