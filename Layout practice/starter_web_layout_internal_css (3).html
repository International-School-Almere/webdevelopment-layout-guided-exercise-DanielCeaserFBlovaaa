<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Layout Starter</title>
  <style>
    /* Intentionally basic and not responsive.
       Students should improve this with Flexbox, Grid, and media queries. */

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: white;
      color: black;
    }

    header {
      background-color: lightgray;
      padding: 20px;
      border: 2px solid black;
      margin: 10px;
    }

    nav {
      background-color: #eeeeee;
      padding: 20px;
      border: 2px solid black;
      margin: 10px;
    }

    main {
      background-color: #f8f8f8;
      padding: 20px;
      border: 2px solid black;
      margin: 10px;
      min-height: 300px;
    }

    section {
      background-color: white;
      border: 2px dashed gray;
      padding: 20px;
      margin-bottom: 15px;
    }

    .box {
      background-color: #e5e5e5;
      border: 2px solid gray;
      padding: 20px;
      margin-bottom: 10px;
    }

    footer {
      background-color: lightgray;
      padding: 20px;
      border: 2px solid black;
      margin: 10px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Website Title</h1>
    <p>This page is plain and not responsive yet.</p>
  </header>

  <nav>
    <p>Home | About | Services | Contact</p>
  </nav>

  <main>
    <section>
      <h2>Main Section</h2>
      <p>This is the main content area.</p>
    </section>

    <section>
      <h2>Cards / Boxes</h2>
      <div class="box">Box 1</div>
      <div class="box">Box 2</div>
      <div class="box">Box 3</div>
    </section>
  </main>

  <footer>
    <p>Footer content</p>
  </footer>

</body>
</html>
